<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أبو سراج</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="background:#0b1020; color:white; text-align:center; padding-top:50px;">
    <h1>🏠 متجر أبو سراج</h1>
    <p id="st">اضغط للاتصال بالمحفظة</p>
    <button id="payBtn" style="background:#4f86ff; color:white; padding:20px; border-radius:12px; font-size:22px; width:85%;">دفع 1 Pi للمهمة 10</button>

    <script>
        window.Pi.init({ version: "2.0", sandbox: false });
        
        async function setup() {
            try { await window.Pi.authenticate(['username', 'payments']); } catch (e) {}
        }

        document.getElementById('payBtn').onclick = () => {
            window.Pi.createPayment({
                amount: 1,
                memo: "Task 10 Final",
                metadata: { type: "task" }
            }, {
                onReadyForServerApproval: (id) => {
                    // هذا السطر يخبر شبكة Pi أنك وافقت فوراً
                    console.log("Approved", id);
                },
                onReadyForServerCompletion: (id, txid) => {
                    alert("تم الدفع بنجاح يا صقر!");
                },
                onCancel: () => alert("تم الإلغاء"),
                onError: (err) => alert("خطأ: " + err.message)
            });
        };
        setup();
    </script>
</body>
</html>
